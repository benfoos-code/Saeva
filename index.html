<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sæva</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .line {
            width: 100px;
            height: 2px;
            background: #fff;
            animation: split 3s ease-in-out infinite;
        }
        @keyframes split {
            0%, 100% { width: 100px; opacity: 1; }
            50% { width: 200px; opacity: 0.8; }
        }
        .sæva {
            margin-top: 40px;
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            color: #00d4aa;
        }
    </style>
</head>
<body>
    <div class="line"></div>
    <div class="sæva">SÆVA</div>
</body>
</html>
