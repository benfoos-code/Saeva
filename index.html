<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sæva</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background: #000;
            color: #fff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .line-top, .line-bottom {
            position: absolute;
            width: 100px;
            height: 2px;
            background: #fff;
            transition: all 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .line-top { top: 50%; }
        .line-bottom { top: 50%; }
        .awakened .line-top { transform: translateY(-100px); }
        .awakened .line-bottom { transform: translateY(100px); }
        .oval {
            width: 80px;
            height: 140px;
            border: 2px solid #00d4aa;
            border-radius: 50%;
            opacity: 0;
            transform: scale(0.8);
            transition: all 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 40px rgba(0,212,170,0.3);
        }
        .awakened .oval {
            opacity: 1;
            transform: scale(1);
        }
        .welcome {
            font-size: 14px;
            color: #fff;
            opacity: 0;
            transition: opacity 1s ease 1s;
            letter-spacing: 2px;
        }
        .awakened .welcome {
            opacity: 1;
        }
        .hint {
            position: absolute;
            bottom: 100px;
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container" id="container" onclick="awaken()">
        <div class="line-top"></div>
        <div class="line-bottom"></div>
        <div class="oval">
            <div class="welcome">WELCOME</div>
        </div>
        <div class="hint">tap to awaken</div>
    </div>

    <script>
        function awaken() {
            document.getElementById('container').classList.add('awakened');
        }
    </script>
</body>
</html>
